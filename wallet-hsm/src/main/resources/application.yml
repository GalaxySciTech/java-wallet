server:
  port: ${SERVER_PORT:10888}

spring:
  application:
    name: wallet-hsm

keystore:
  dir: ${KEYSTORE_DIR:/data/keystores}
  password: ${KEYSTORE_PASSWORD:}
  eosDepositAddress: ${EOS_DEPOSIT_ADDRESS:}

logging:
  level:
    root: INFO
    com.wallet: ${LOG_LEVEL:INFO}
  file:
    name: logs/wallet-hsm.log
