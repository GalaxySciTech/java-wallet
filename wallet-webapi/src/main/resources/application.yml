server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: java-wallet-app
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/wallet_db?allowMultiQueries=true&useSSL=false&characterEncoding=UTF-8&autoReconnect=true}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none

wallet:
  keystore:
    dir: ${WALLET_KEYSTORE_DIR:./data/keystore}
    password: ${WALLET_KEYSTORE_PASSWORD:change-me}
  scheduler:
    enabled: true

logging:
  level:
    root: INFO
    com.wallet: ${LOG_LEVEL:INFO}
